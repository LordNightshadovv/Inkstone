<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Template T2 Preview</title>
    <style>
        :root {
            --paper: #F8F6F0;
            --ink-deep: #1A1A1A;
            --accent-green: #3A7467;
            --ink-mid: #444444;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--paper);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .preview-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 400px;
        }
        
        .text-column {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .preview-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink-deep);
            margin-bottom: 20px;
            line-height: 1.2;
            font-family: 'Crimson Text', serif;
        }
        
        .preview-abstract {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--ink-mid);
        }
        
        .image-column {
            background: linear-gradient(45deg, var(--accent-green), #7BAF9E);
            position: relative;
            overflow: hidden;
        }
        
        .placeholder-image {
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400"><rect width="400" height="400" fill="%233A7467"/><circle cx="120" cy="120" r="60" fill="%237BAF9E" opacity="0.7"/><circle cx="280" cy="280" r="80" fill="%23C94C4C" opacity="0.5"/><rect x="50" y="200" width="300" height="4" fill="%23FDFCF9" opacity="0.3"/><rect x="50" y="220" width="200" height="4" fill="%23FDFCF9" opacity="0.3"/></svg>');
            background-size: cover;
            background-position: center;
            object-fit: cover;
        }
        
        .template-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
            
            .text-column {
                padding: 40px 30px;
            }
            
            .preview-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="template-label">Featured Template T2</div>
        
        <div class="text-column">
            <h1 class="preview-title">Finding My Voice Through Art</h1>
            <p class="preview-abstract">
                A glimpse into student art studios blending traditional ink painting with digital media techniques. This editorial piece explores the intersection of heritage and innovation in contemporary Chinese art education.
            </p>
        </div>
        
        <div class="image-column">
            <div class="placeholder-image"></div>
        </div>
    </div>
</body>
</html>
