<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow Template Preview</title>
    <style>
        :root {
            --paper: #F8F6F0;
            --ink-deep: #1A1A1A;
            --accent-green: #3A7467;
            --ink-mid: #444444;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--paper);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .preview-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .slider-container {
            position: relative;
            height: 400px;
            background: linear-gradient(45deg, var(--accent-green), #7BAF9E);
            overflow: hidden;
        }
        
        .slider-image {
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"><rect width="800" height="400" fill="%233A7467"/><circle cx="200" cy="150" r="80" fill="%237BAF9E" opacity="0.6"/><circle cx="600" cy="250" r="60" fill="%23C94C4C" opacity="0.4"/><rect x="100" y="300" width="600" height="8" fill="%23FDFCF9" opacity="0.3"/><rect x="100" y="320" width="400" height="8" fill="%23FDFCF9" opacity="0.3"/></svg>');
            background-size: cover;
            background-position: center;
        }
        
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .nav-arrow:hover {
            background: white;
            transform: translateY(-50%) scale(1.1);
        }
        
        .nav-arrow.prev {
            left: 20px;
        }
        
        .nav-arrow.next {
            right: 20px;
        }
        
        .nav-arrow svg {
            width: 20px;
            height: 20px;
            fill: var(--accent-green);
        }
        
        .pagination-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: white;
            transform: scale(1.2);
        }
        
        .text-content {
            padding: 40px;
            text-align: left;
        }
        
        .preview-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink-deep);
            margin-bottom: 16px;
            text-align: left;
            font-family: 'Crimson Text', serif;
        }
        
        .preview-abstract {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--ink-mid);
            text-align: left;
        }
        
        .template-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="slider-container">
            <div class="template-label">Slideshow Template</div>
            
            <div class="slider-image"></div>
            
            <div class="nav-arrow prev">
                <svg viewBox="0 0 24 24">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </div>
            
            <div class="nav-arrow next">
                <svg viewBox="0 0 24 24">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
            
            <div class="pagination-dots">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        
        <div class="text-content">
            <h1 class="preview-title">Modern Calligraphy Exhibition</h1>
            <p class="preview-abstract">
                An immersive slideshow experience showcasing the evolution of Chinese calligraphy in the digital age. Each image tells a story of tradition meeting innovation, where ancient brushstrokes find new life in contemporary artistic expression.
            </p>
        </div>
    </div>
</body>
</html>
