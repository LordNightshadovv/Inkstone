<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waterfall Template Preview</title>
    <style>
        :root {
            --paper: #F8F6F0;
            --ink-deep: #1A1A1A;
            --accent-green: #3A7467;
            --ink-mid: #444444;
        }
        
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--paper);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .preview-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 40% 60%;
            min-height: 500px;
        }
        
        .text-column {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .preview-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--ink-deep);
            margin-bottom: 20px;
            text-align: left;
            line-height: 1.2;
            font-family: 'Crimson Text', serif;
        }
        
        .preview-abstract {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--ink-mid);
            text-align: left;
        }
        
        .gallery-column {
            padding: 20px;
            background: #fafafa;
        }
        
        .waterfall-grid {
            column-count: 3;
            column-gap: 16px;
            height: 100%;
        }
        
        .gallery-item {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .gallery-item:nth-child(1) {
            height: 120px;
            background: linear-gradient(45deg, var(--accent-green), #7BAF9E);
        }
        
        .gallery-item:nth-child(2) {
            height: 180px;
            background: linear-gradient(135deg, #7BAF9E, #C94C4C);
        }
        
        .gallery-item:nth-child(3) {
            height: 100px;
            background: linear-gradient(90deg, #C94C4C, var(--accent-green));
        }
        
        .gallery-item:nth-child(4) {
            height: 160px;
            background: linear-gradient(225deg, var(--accent-green), #7BAF9E);
        }
        
        .gallery-item:nth-child(5) {
            height: 140px;
            background: linear-gradient(45deg, #7BAF9E, #C94C4C);
        }
        
        .gallery-item:nth-child(6) {
            height: 110px;
            background: linear-gradient(315deg, #C94C4C, var(--accent-green));
        }
        
        .gallery-item:nth-child(7) {
            height: 190px;
            background: linear-gradient(180deg, var(--accent-green), #7BAF9E);
        }
        
        .gallery-item:nth-child(8) {
            height: 130px;
            background: linear-gradient(270deg, #7BAF9E, #C94C4C);
        }
        
        .template-label {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 10;
        }
        
        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
            
            .waterfall-grid {
                column-count: 2;
            }
            
            .text-column {
                padding: 30px 20px;
            }
            
            .preview-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <div class="template-label">Waterfall Template</div>
        
        <div class="text-column">
            <h1 class="preview-title">Street Food Chronicles</h1>
            <p class="preview-abstract">
                An asymmetric gallery showcasing the vibrant energy and cultural significance of street food across Chinese cities. Each photograph captures not just the food, but the stories, traditions, and communities that surround these culinary experiences.
            </p>
        </div>
        
        <div class="gallery-column">
            <div class="waterfall-grid">
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
            </div>
        </div>
    </div>
</body>
</html>
